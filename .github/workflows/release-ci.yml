name: Release CI

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: lithic-linux-x86_64
            rustflags: ""

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: lithic-windows-x86_64
            rustflags: "-C link-args=/SUBSYSTEM:CONSOLE"

          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: lithic-macos-x86_64
            rustflags: ""

          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: lithic-macos-arm64
            rustflags: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev libxkbcommon-dev libgtk-3-dev libwayland-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install pkg-config

      - name: Build CLI
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --target ${{ matrix.target }} --package lithic-cli

      - name: Build GUI
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --target ${{ matrix.target }} --package lithic-gui

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            target/${{ matrix.target }}/release/lithic-cli${{ runner.os == 'Windows' && '.exe' || '' }}
            target/${{ matrix.target }}/release/lithic-gui${{ runner.os == 'Windows' && '.exe' || '' }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create platform-specific archives
        run: |
          mkdir -p archives
          cd release-artifacts
          for dir in */; do
            platform=$(basename "$dir")
            cd "$dir"

            if [[ "$platform" == *"windows"* ]]; then
              zip -9 "../../archives/${platform}.zip" ./*
            else
              zip -9 "../../archives/${platform}.zip" ./*
            fi

            cd ..
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: archives/*
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
