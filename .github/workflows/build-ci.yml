name: Build CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: lithic-linux-x86_64
            rustflags: ""

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: lithic-windows-x86_64
            rustflags: "-C link-args=/SUBSYSTEM:CONSOLE"

          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: lithic-macos-x86_64
            rustflags: ""

          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: lithic-macos-arm64
            rustflags: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev libxkbcommon-dev libgtk-3-dev libwayland-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install pkg-config

      - name: Build CLI
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --target ${{ matrix.target }} --package lithic-cli

      - name: Build GUI
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --target ${{ matrix.target }} --package lithic-gui

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}-cli
          path: target/${{ matrix.target }}/release/lithic-cli${{ runner.os == 'Windows' && '.exe' || '' }}
          if-no-files-found: error

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}-gui
          path: target/${{ matrix.target }}/release/lithic-gui${{ runner.os == 'Windows' && '.exe' || '' }}
          if-no-files-found: error
