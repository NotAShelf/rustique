
name: Rustique Workflow

on:
  push:
    branches: [ omega ]
    tags: ['v*']
  pull_request:
    branches: [ omega ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: Rustique
            asset_name: rustique-linux-x86_64
            rustflags: ""

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: Rustique.exe
            asset_name: rustique-windows-x86_64
            rustflags: "-C link-args=/SUBSYSTEM:CONSOLE"

          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: Rustique
            asset_name: rustique-macos-x86_64
            rustflags: ""
            
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: Rustique
            asset_name: rustique-macos-arm64
            rustflags: ""

    steps:
    - uses: actions/checkout@v4

    - name: Get version
      id: version
      shell: bash
      run: |
        # Extract version from Cargo.toml
        VERSION=$(grep '^version =' Cargo.toml | head -1 | sed 's/.*= *"\([^"]*\)".*/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install musl tools (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools musl-dev

    - name: Build with Cargo
      env:
        RUSTFLAGS: ${{ matrix.rustflags }}
      run: cargo build --release --target ${{ matrix.target }}
      
      # Create versioned filename and copy binary
    - name: Prepare versioned binary
      shell: bash
      run: |
        # Create a directory for the versioned binary
        mkdir -p versioned-binary
        
        # Determine file extension
        if [[ "${{ matrix.binary_name }}" == *.exe ]]; then
          EXT=".exe"
          BASE_NAME="${{ matrix.binary_name%%.exe }}"
        else
          EXT=""
          BASE_NAME="${{ matrix.binary_name }}"
        fi
        
        # Create versioned filename
        VERSIONED_NAME="${BASE_NAME}-v${{ steps.version.outputs.version }}-${{ matrix.asset_name }}${EXT}"
        
        # Copy binary with versioned name
        cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "versioned-binary/${VERSIONED_NAME}"
        
        echo "Created versioned binary: ${VERSIONED_NAME}"
        echo "versioned_name=${VERSIONED_NAME}" >> $GITHUB_ENV
    
        
    - name: Upload versioned artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}-v${{ steps.version.outputs.version }}
        path: versioned-binary/${{ env.versioned_name }}
        if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*/*
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
