[translation_by]
author = "Theysa"

[HelpMenu.main]
sync = "Checks with the VintageStory mods website for any updates to mods you have installed. Run update after this command to update your mods."
list = "List installed mods and their versions and any missing dependencies. Running sync first will show any available updates to your mods."
update = "Updates a specific mod OR all mods installed. Runs sync after completion."
install = "Install a specific mod. Must use the mod_id, Example: ./Rustique install alchemy"
search = "Search the mod website for new mods, Example: ./Rustique search -q magic"
config = "Manage config options for Rustique."
misc = "Miscellaneous items for Rustique, like shell auto-completion and 1-click mod installation."
download = "Download a Vintage Story executable."
info = "Get more information about the mod specified."
modpack = "Create, download, update modpacks for VintageStory."
self = "Manage the Rustique binary; Check for updates, perform updates."
delete = "Remove mods and backups."
help = "Print this message or the help of the given subcommand(s)"

[HelpMenu.sync]
sync_search_db = "Sync the mod info from the api endpoint /api/mods and save it locally."
sync_search_db.long = '''
Sync the mod info from the api endpoint /api/mods and save it locally.
This file is used for the search command so we are not making a ton of unneeded api calls and to obtain the mod-id for mods that don't provide one in their modinfo.json
linux/mac: [~/.config/rustique/mod-id-sync.json.]
windows: [%appdata%/rustique/mod-id-sync.json]
'''
sync_game_versions = "Sync a local list of all game versions from the api. This is used with version pinning to ensure we have accurate version numbers."
sync_game_versions.long = [
    "Sync a local list of all game versions from the api. This is used with version pinning to ensure we have accurate version numbers.",
    "linux/mac: [~/.config/rustique/game-versions.json]",
    "windows: [%appdata%/rustique/game-versions.json]"
]

